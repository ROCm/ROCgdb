name: TheRock Test Packages single-node

on:
  workflow_call:
    inputs:
      amdgpu_families:
        type: string
      artifact_group:
        type: string
      test_runs_on:
        type: string
      artifact_run_id:
        type: string
  workflow_dispatch:
    inputs:
      amdgpu_families:
        type: string
      artifact_group:
        type: string
      test_runs_on:
        type: string
      artifact_run_id:
        type: string

permissions:
  contents: read

env:
  # WIP: paired with the TheRock branch users/dravindr/tr_rocgdb (ROCm/TheRock#5917),
  # which adds the generic, component-agnostic rocgdb entry to test_runner.py's
  # COMPONENT_OVERRIDES and the optional install of the test-filter files.
  # Revert to a pinned ROCm/TheRock SHA before merge once that PR lands.
  THEROCK_COMMIT_REF: users/dravindr/tr_rocgdb
  VENV_DIR: ${{ github.workspace }}/.venv
  OUTPUT_ARTIFACTS_DIR: "./build"
  # Consumed by TheRock's test_runner.py to derive ROCM_PATH and the ctest
  # --test-dir. Artifacts unpack into ./build, with binaries under ./build/bin.
  THEROCK_BIN_DIR: "./build/bin"

jobs:
  rocgdb-tests:
    name: 'rocgdb'
    runs-on: ${{ inputs.test_runs_on }}
    timeout-minutes: 45

    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04_rocgdb@sha256:7063e922b4b9145c92f20011674571f1c97b8fad6faaeb0b7d2d165b0bd9ae8b
      options: "--cap-add=SYS_PTRACE --ipc host --group-add video --device /dev/kfd --device /dev/dri --group-add 110 --ulimit memlock=-1:-1 --security-opt seccomp=unconfined --env-file /etc/podinfo/gha-gpu-isolation-settings --user 0:0"

    defaults:
      run:
        shell: bash

    env:
      ARTIFACT_RUN_ID: "${{ inputs.artifact_run_id }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: "ROCm/TheRock"
          ref: ${{ env.THEROCK_COMMIT_REF }}

      - name: Run setup test environment workflow
        uses: './.github/actions/setup_test_environment'
        with:
          ARTIFACT_RUN_ID: ${{ env.ARTIFACT_RUN_ID }}
          AMDGPU_FAMILIES: ${{ inputs.amdgpu_families }}
          ARTIFACT_GROUP: ${{ inputs.artifact_group }}
          OUTPUT_ARTIFACTS_DIR: ${{ env.OUTPUT_ARTIFACTS_DIR }}
          VENV_DIR: ${{ env.VENV_DIR }}
          FETCH_ARTIFACT_ARGS: "--debug-tools --tests"
          IS_PR_FROM_FORK: ${{ github.event.pull_request.head.repo.fork }}

      - name: Run rocgdb tests
        env:
          # Drives TheRock's generic, component-agnostic test_runner.py.
          # It runs `ctest -L $TEST_TYPE` in the installed testsuite tree
          # (tests/rocgdb/gdb/testsuite, selected via COMPONENT_OVERRIDES on
          # the TheRock side). The CTestTestfile.cmake there maps each tier to
          # `../../test_rocgdb.py --tier <name>`, which expands test_patterns
          # from test_categories.yaml and drives the GCC/LLVM DejaGnu matrix.
          # All rocgdb-specific logic lives in this repo; TheRock stays generic.
          TEST_COMPONENT: rocgdb
          # Use the curated `quick` smoke tier for PR CI: it finishes within the
          # job timeout. The broader standard/comprehensive/full tiers run the
          # full DejaGnu matrix and are intended for nightly/extended pipelines.
          TEST_TYPE: quick
        run: |
          python build_tools/github_actions/test_executable_scripts/test_runner.py
