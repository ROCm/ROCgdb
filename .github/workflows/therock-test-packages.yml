name: TheRock Test Packages single-node

on:
  workflow_call:
    inputs:
      amdgpu_families:
        type: string
      artifact_group:
        type: string
      test_runs_on:
        type: string
      artifact_run_id:
        type: string
  workflow_dispatch:
    inputs:
      amdgpu_families:
        type: string
      artifact_group:
        type: string
      test_runs_on:
        type: string
      artifact_run_id:
        type: string

permissions:
  contents: read

env:
  THEROCK_COMMIT_REF: c9529ebdedc2e52c7b4dc26d209725a31f616ac7 # 2026-03-13 commit
  VENV_DIR: ${{ github.workspace }}/.venv
  OUTPUT_ARTIFACTS_DIR: "./build"
  THEROCK_BIN_DIR: "./build/bin"

jobs:
  rocgdb-tests:
    name: 'rocgdb'
    runs-on: ${{ inputs.test_runs_on }}
    timeout-minutes: 30

    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04_rocgdb@sha256:939b8e35887144d1ca4eca928dc2869991339cab869168790e495fc0a5907bbb
      options: "--cap-add=SYS_PTRACE --ipc host --group-add video --device /dev/kfd --device /dev/dri --group-add 110 --ulimit memlock=-1:-1 --security-opt seccomp=unconfined --env-file /etc/podinfo/gha-gpu-isolation-settings --user 0:0"

    defaults:
      run:
        shell: bash

    env:
      ARTIFACT_RUN_ID: "${{ inputs.artifact_run_id }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: "ROCm/TheRock"
          ref: ${{ env.THEROCK_COMMIT_REF }}

      - name: Run setup test environment workflow
        uses: './.github/actions/setup_test_environment'
        with:
          ARTIFACT_RUN_ID: ${{ env.ARTIFACT_RUN_ID }}
          AMDGPU_FAMILIES: ${{ inputs.amdgpu_families }}
          ARTIFACT_GROUP: ${{ inputs.artifact_group }}
          OUTPUT_ARTIFACTS_DIR: ${{ env.OUTPUT_ARTIFACTS_DIR }}
          VENV_DIR: ${{ env.VENV_DIR }}
          FETCH_ARTIFACT_ARGS: "--debug-tools --tests"
          IS_PR_FROM_FORK: ${{ github.event.pull_request.head.repo.fork }}

      - name: Run rocgdb tests
        run: |
          python build_tools/github_actions/test_executable_scripts/test_rocgdb.py

  rocr-debug-agent-tests:
    name: 'rocr-debug-agent'
    runs-on: ${{ inputs.test_runs_on }}
    timeout-minutes: 10

    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04@sha256:4150afe4759d14822f0e3f8930e1124f26e11f68b5c7b91ec9a02b20b1ebbb98
      options: ${{ env.GPU_CONTAINER_OPTIONS }}

    defaults:
      run:
        shell: bash

    env:
      ARTIFACT_RUN_ID: "${{ inputs.artifact_run_id }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: "ROCm/TheRock"
          ref: ${{ env.THEROCK_COMMIT_REF }}

      - name: Run setup test environment workflow
        uses: './.github/actions/setup_test_environment'
        with:
          ARTIFACT_RUN_ID: ${{ env.ARTIFACT_RUN_ID }}
          AMDGPU_FAMILIES: ${{ inputs.amdgpu_families }}
          ARTIFACT_GROUP: ${{ inputs.artifact_group }}
          OUTPUT_ARTIFACTS_DIR: ${{ env.OUTPUT_ARTIFACTS_DIR }}
          VENV_DIR: ${{ env.VENV_DIR }}
          FETCH_ARTIFACT_ARGS: "--debug-tools --tests"
          IS_PR_FROM_FORK: ${{ github.event.pull_request.head.repo.fork }}

      - name: Run rocr-debug-agent tests
        run: |
          python build_tools/github_actions/test_executable_scripts/test_rocr-debug-agent.py