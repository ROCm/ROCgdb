# Multi-Arch CI for rocgdb
#
# Builds the current rocgdb checkout against TheRock using TheRock's
# multi-arch CI pipeline. rocgdb is substituted into TheRock's build via
# the external_repo mechanism (see
# build_tools/github_actions/detect_external_repo_config.py in TheRock),
# which injects -DTHEROCK_USE_EXTERNAL_ROCGDB=ON and
# -DTHEROCK_ROCGDB_SOURCE_DIR=<checkout_path> at the debug-tools stage.

name: TheRock Multi-Arch CI

on:
  push:
    branches:
      - amd-staging
      - amd-staging-rocgdb-*
  pull_request:
    branches:
      - amd-staging
      - amd-staging-rocgdb-*
  workflow_dispatch:
    inputs:
      linux_amdgpu_families:
        type: string
        description: "Comma-separated list of Linux GPU families to build and test. ex: gfx94X, gfx950 (empty = use default)"
        default: ""
      linux_test_labels:
        type: string
        description: "If set, reduce test set on Linux to the listed labels prefixed with 'test:'. ex: test:rocgdb"
        default: ""
      prebuilt_stages:
        type: string
        description: "Comma-separated build stages to skip (or 'all' for all stages); artifacts are copied from baseline_run_id instead"
        default: ""
      baseline_run_id:
        type: string
        description: "Workflow run ID to copy prebuilt stage artifacts from; required when prebuilt_stages is set"
        default: ""

permissions:
  contents: read

concurrency:
  # A PR number if a pull request and otherwise the commit hash. This
  # cancels queued and in-progress runs for the same PR (presubmit) or
  # commit (postsubmit). The workflow name is prepended to avoid conflicts
  # between different workflows.
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ROCm/TheRock/.github/workflows/setup_multi_arch.yml@users/lumachad/rocgdb/multi-arch
    with:
      build_variant: "release"
      # rocgdb's existing CI runs on gfx94X-dcgpu; default to gfx94X for
      # parity. Override at workflow_dispatch time to fan out wider.
      linux_amdgpu_families: ${{ inputs.linux_amdgpu_families || 'gfx94X' }}
      windows_amdgpu_families: ""
      linux_test_labels: ${{ inputs.linux_test_labels || '' }}
      windows_test_labels: ""
      prebuilt_stages: ${{ inputs.prebuilt_stages || '' }}
      baseline_run_id: ${{ inputs.baseline_run_id || '' }}
      external_repo: '{"repository":"${{ github.repository }}","ref":"${{ github.sha }}"}'
      repository: ROCm/TheRock
      ref: users/lumachad/rocgdb/multi-arch

  linux_build_and_test:
    name: Linux::${{ fromJSON(needs.setup.outputs.linux_build_config || '{}').build_variant_label || 'skip' }}
    needs: setup
    if: >-
      ${{
        needs.setup.outputs.linux_build_config != '' &&
        needs.setup.outputs.enable_build_jobs == 'true'
      }}
    uses: ROCm/TheRock/.github/workflows/multi_arch_ci_linux.yml@users/lumachad/rocgdb/multi-arch
    secrets: inherit
    with:
      build_config: ${{ needs.setup.outputs.linux_build_config }}
      test_labels: ${{ needs.setup.outputs.linux_test_labels }}
      rocm_package_version: ${{ needs.setup.outputs.rocm_package_version }}
      test_type: ${{ needs.setup.outputs.test_type }}
      external_repo_config: ${{ needs.setup.outputs.external_repo_config }}
      repository: ROCm/TheRock
      ref: users/lumachad/rocgdb/multi-arch
    permissions:
      contents: read
      id-token: write

  multi_arch_ci_summary:
    name: Multi-Arch CI Summary
    if: always()
    needs:
      - setup
      - linux_build_and_test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TheRock repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "ROCm/TheRock"
          ref: users/lumachad/rocgdb/multi-arch
          sparse-checkout: build_tools/github_actions
          sparse-checkout-cone-mode: true

      - name: Evaluate workflow results
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python build_tools/github_actions/workflow_summary.py \
            --needs-json '${{ toJSON(needs) }}'
