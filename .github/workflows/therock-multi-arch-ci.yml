# Multi-Arch CI for rocgdb
#
# Replicates TheRock's multi-arch CI pipeline by calling TheRock's
# reusable workflows directly, with rocgdb-specific narrowing:
# only the build stages required for debug-tools (foundation,
# compiler-runtime, debug-tools) run; python packaging is disabled.

name: TheRock Multi-Arch CI

on:
  workflow_dispatch:
    inputs:
      linux_amdgpu_families:
        type: string
        description: "Comma-separated Linux GPU families. ex: gfx94X,gfx950 (empty = skip linux)"
        default: ""
      linux_test_labels:
        type: string
        description: "Optional test:* labels to narrow Linux tests. ex: test:rocgdb-cpu"
        default: ""
      prebuilt_stages:
        type: string
        default: ""
        description: "Comma-separated build stages to fetch from baseline_run_id instead of building"
      baseline_run_id:
        type: string
        default: ""
        description: "Workflow run ID to copy prebuilt stage artifacts from"
  pull_request:
    branches:
      - amd-staging
      - amd-staging-rocgdb-*
  push:
    branches:
      - amd-staging
      - amd-staging-rocgdb-*

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

# TODO: once these changes land in ROCm/TheRock main, point the @ref
# values below at the merged commit / main and drop this branch pin.

jobs:
  setup:
    uses: ROCm/TheRock/.github/workflows/setup_multi_arch.yml@users/lumachad/multi-arch-ci-rocgdb
    with:
      build_variant: "release"
      linux_amdgpu_families: ${{ inputs.linux_amdgpu_families || 'gfx94X,gfx950' }}
      windows_amdgpu_families: ""
      linux_test_labels: ${{ inputs.linux_test_labels || '' }}
      prebuilt_stages: ${{ inputs.prebuilt_stages || '' }}
      baseline_run_id: ${{ inputs.baseline_run_id || '' }}
      # Only foundation + compiler-runtime + debug-tools are needed for rocgdb.
      skip_stages: "wsl-rocdxg,math-libs,comm-libs,dctools-core,profiler-apps,iree-compiler,fusilli-libs,media-libs"
      build_python_packages: false
      repository: ROCm/TheRock
      ref: users/lumachad/multi-arch-ci-rocgdb
      external_repo: '{"repository":"${{ github.repository }}","ref":"${{ github.sha }}"}'

  linux_build_and_test:
    name: Linux::${{ fromJSON(needs.setup.outputs.linux_build_config || '{}').build_variant_label || 'skip' }}
    needs: setup
    if: >-
      ${{
        needs.setup.outputs.linux_build_config != '' &&
        needs.setup.outputs.enable_build_jobs == 'true'
      }}
    uses: ROCm/TheRock/.github/workflows/multi_arch_ci_linux.yml@users/lumachad/multi-arch-ci-rocgdb
    secrets: inherit
    with:
      build_config: ${{ needs.setup.outputs.linux_build_config }}
      test_labels: ${{ needs.setup.outputs.linux_test_labels }}
      rocm_package_version: ${{ needs.setup.outputs.rocm_package_version }}
      test_type: ${{ needs.setup.outputs.test_type }}
      external_repo_config: ${{ needs.setup.outputs.external_repo_config }}
      repository: ROCm/TheRock
      ref: users/lumachad/multi-arch-ci-rocgdb
    permissions:
      contents: read
      id-token: write

  multi_arch_ci_summary:
    name: Multi-Arch CI Summary
    if: always()
    needs:
      - setup
      - linux_build_and_test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TheRock repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "ROCm/TheRock"
          ref: users/lumachad/multi-arch-ci-rocgdb
          sparse-checkout: build_tools/github_actions
          sparse-checkout-cone-mode: true

      - name: Evaluate workflow results
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python build_tools/github_actions/workflow_summary.py \
            --needs-json '${{ toJSON(needs) }}'
