# Multi-Arch CI for rocgdb
#
# Builds the current rocgdb checkout against TheRock using TheRock's
# multi-arch CI pipeline. rocgdb is substituted into TheRock's build via
# the external_repo mechanism (see
# build_tools/github_actions/detect_external_repo_config.py in TheRock),
# which injects -DTHEROCK_USE_EXTERNAL_ROCGDB=ON and
# -DTHEROCK_ROCGDB_SOURCE_DIR=<checkout_path> at the debug-tools stage.
#
# Minimal build scope:
# rocgdb only lives in the `debug-tools` stage, which depends on
# `compiler-runtime` (which depends on `foundation`). All other sibling
# stages are skipped via TheRock's `prebuilt_stages` input. Because we
# pass no `baseline_run_id`, TheRock's `copy_prebuilt_stages` job is a
# no-op (it requires both) and the listed stages are simply not built.
#
# NOTE: a few downstream jobs in TheRock's multi_arch_ci_linux.yml
# (validate_artifact_structure, test_artifacts_per_family,
# build_python_packages) run unconditionally and may fail when the
# skipped stages' artifacts are absent. Narrowing test_labels to
# 'test:sanity' avoids running unrelated tests; remaining failures from
# missing artifacts must be addressed in TheRock itself.
#
# rocgdb testing: TheRock's built-in 'rocgdb' test component is
# bypassed (linux_test_labels='test:sanity' excludes it). Instead, two
# caller-side jobs (rocgdb_cpu, rocgdb_gpu) fetch the debug-tools
# artifacts produced by this run and invoke test_rocgdb.py themselves,
# split by testsuite (gdb.dwarf2 on CPU, gdb.rocm on GPU). This gives
# us full control over the script's CLI per job.

name: TheRock Multi-Arch CI

on:
  push:
    branches:
      - amd-staging
      - amd-staging-rocgdb-*
  pull_request:
    branches:
      - amd-staging
      - amd-staging-rocgdb-*
  workflow_dispatch:
    inputs:
      linux_amdgpu_families:
        type: string
        description: "Comma-separated list of Linux GPU families to build and test. ex: gfx94X, gfx950 (empty = use default)"
        default: ""
      linux_test_labels:
        type: string
        description: "Labels for TheRock's built-in test matrix. Default 'test:sanity' runs only sanity; rocgdb testing is handled by the caller-side rocgdb_cpu / rocgdb_gpu jobs below."
        default: "test:sanity"
      prebuilt_stages:
        type: string
        description: "Comma-separated build stages to skip. Defaults to skipping every stage not in debug-tools's dependency chain. If baseline_run_id is also set, artifacts for these stages are copied from that run instead."
        default: "math-libs,comm-libs,dctools-core,profiler-apps,iree-compiler,fusilli-libs,media-libs"
      baseline_run_id:
        type: string
        description: "Workflow run ID to copy prebuilt stage artifacts from; required when prebuilt_stages is set"
        default: ""

permissions:
  contents: read

# Container option layering (kept in sync with ROCm/TheRock#5132):
#   BASE   = --ipc host --user 0:0 --ulimit memlock=-1:-1
#            --security-opt seccomp=unconfined
#   GPU    = --group-add video --device /dev/kfd --device /dev/dri
#            --group-add 993 --group-add 992 --group-add 110
#            --env-file /etc/podinfo/gha-gpu-isolation-settings
#   ROCGDB = --cap-add=SYS_PTRACE
# rocgdb_cpu uses BASE + ROCGDB; rocgdb_gpu uses BASE + GPU + ROCGDB.
# Inlined per-job because GHA's `env` context is not available in
# `container.options` expressions.

concurrency:
  # A PR number if a pull request and otherwise the commit hash. This
  # cancels queued and in-progress runs for the same PR (presubmit) or
  # commit (postsubmit). The workflow name is prepended to avoid conflicts
  # between different workflows.
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ROCm/TheRock/.github/workflows/setup_multi_arch.yml@users/lumachad/rocgdb/multi-arch
    with:
      build_variant: "release"
      # rocgdb's existing CI runs on gfx94X-dcgpu; default to gfx94X for
      # parity. Override at workflow_dispatch time to fan out wider.
      linux_amdgpu_families: ${{ inputs.linux_amdgpu_families || 'gfx94X' }}
      windows_amdgpu_families: ""
      # Defaults below are duplicated from the workflow_dispatch inputs:
      # workflow_dispatch input defaults only apply on manual runs, so
      # push/pull_request triggers need the same fallbacks here.
      linux_test_labels: ${{ inputs.linux_test_labels || 'test:sanity' }}
      windows_test_labels: ""
      prebuilt_stages: ${{ inputs.prebuilt_stages || 'math-libs,comm-libs,dctools-core,profiler-apps,iree-compiler,fusilli-libs,media-libs' }}
      baseline_run_id: ${{ inputs.baseline_run_id || '' }}
      external_repo: '{"repository":"${{ github.repository }}","ref":"${{ github.sha }}"}'
      repository: ROCm/TheRock
      ref: users/lumachad/rocgdb/multi-arch

  linux_build_and_test:
    name: Linux::${{ fromJSON(needs.setup.outputs.linux_build_config || '{}').build_variant_label || 'skip' }}
    needs: setup
    if: >-
      ${{
        needs.setup.outputs.linux_build_config != '' &&
        needs.setup.outputs.enable_build_jobs == 'true'
      }}
    uses: ROCm/TheRock/.github/workflows/multi_arch_ci_linux.yml@users/lumachad/rocgdb/multi-arch
    secrets: inherit
    with:
      build_config: ${{ needs.setup.outputs.linux_build_config }}
      test_labels: ${{ needs.setup.outputs.linux_test_labels }}
      rocm_package_version: ${{ needs.setup.outputs.rocm_package_version }}
      test_type: ${{ needs.setup.outputs.test_type }}
      external_repo_config: ${{ needs.setup.outputs.external_repo_config }}
      repository: ROCm/TheRock
      ref: users/lumachad/rocgdb/multi-arch
    permissions:
      contents: read
      id-token: write

  # ==========================================================================
  # Caller-side rocgdb test jobs.
  #
  # Both jobs pull the debug-tools + tests artifacts produced by this
  # run and invoke test_rocgdb.py with a job-specific testsuite filter.
  # Split mirrors ROCm/TheRock#5132: gdb.dwarf2 has no GPU dependency
  # and runs on a CPU runner; gdb.rocm runs per GPU family.
  # ==========================================================================
  rocgdb_cpu:
    name: rocgdb CPU tests (gdb.dwarf2)
    needs: [setup, linux_build_and_test]
    # Intentionally omit !failure(): TheRock's reusable workflow reports
    # overall failure when its unconditional downstream jobs (deb/rpm
    # packages, validate_artifact_structure, build_python_packages) fail
    # due to skipped stages (see top-of-file note). The debug-tools
    # artifacts we need are still produced; let the artifact-fetch step
    # be the failure point if they are genuinely missing.
    if: >-
      ${{
        !cancelled() &&
        needs.setup.outputs.linux_build_config != ''
      }}
    runs-on: azure-linux-scale-rocm
    permissions:
      contents: read
      id-token: write
    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04_rocgdb:latest
      # BASE + ROCGDB (see comment near top of file). Inlined because
      # GHA's `env` context is not available in `container.options`.
      options: --ipc host --user 0:0 --ulimit memlock=-1:-1 --security-opt seccomp=unconfined --cap-add=SYS_PTRACE
    env:
      # gdb.dwarf2 is GPU-independent; pick any family from the build matrix.
      AMDGPU_FAMILY: ${{ fromJSON(needs.setup.outputs.linux_build_config).per_family_info[0].amdgpu_family }}
      AMDGPU_TARGETS: ${{ fromJSON(needs.setup.outputs.linux_build_config).per_family_info[0].amdgpu_targets }}
      THEROCK_REF: users/lumachad/rocgdb/multi-arch
      OUTPUT_ARTIFACTS_DIR: ${{ github.workspace }}/build
    steps:
      # TEMPORARY: until ROCm/TheRock#4960 lands, test_rocgdb.py is not
      # installed into <artifact-dir>/tests/rocgdb/. Sparse-clone
      # ROCgdb@amd-staging for just the script. After #4960 is merged,
      # drop this step and invoke the script directly from
      # ${OUTPUT_ARTIFACTS_DIR}/tests/rocgdb/test_rocgdb.py.
      - name: Checkout test_rocgdb.py (TEMP, see ROCm/TheRock#4960)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/ROCgdb
          ref: amd-staging
          path: rocgdb-src
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: true

      - name: Sparse-checkout TheRock for install_rocm_from_artifacts.py
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/TheRock
          ref: ${{ env.THEROCK_REF }}
          path: therock
          sparse-checkout: build_tools
          sparse-checkout-cone-mode: true

      - name: Install artifact-fetch dependencies
        run: python3 -m pip install boto3

      - name: Fetch debug-tools + tests artifacts
        working-directory: therock
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/install_rocm_from_artifacts.py \
            --run-id=${{ github.run_id }} \
            --artifact-group=${{ env.AMDGPU_FAMILY }} \
            --amdgpu-targets=${{ env.AMDGPU_TARGETS }} \
            --output-dir=${{ env.OUTPUT_ARTIFACTS_DIR }} \
            --debug-tools --tests

      - name: Run rocgdb CPU tests (gdb.dwarf2)
        run: |
          python3 rocgdb-src/.github/scripts/test_rocgdb.py --tests gdb.dwarf2

  rocgdb_gpu:
    name: rocgdb GPU tests (gdb.rocm, ${{ matrix.family_info.amdgpu_family }})
    needs: [setup, linux_build_and_test]
    # NOTE: cannot filter out matrix entries with empty `test-runs-on`
    # at job level — GHA does not allow `matrix.*` in job-level `if:`.
    # `runs-on: ''` will surface as a job-level error for those entries
    # rather than silently skipping; revisit if it becomes noisy.
    # See rocgdb_cpu for why !failure() is intentionally omitted.
    if: >-
      ${{
        !cancelled() &&
        needs.setup.outputs.linux_build_config != ''
      }}
    strategy:
      fail-fast: false
      matrix:
        family_info: ${{ fromJSON(needs.setup.outputs.linux_build_config).per_family_info }}
    runs-on: ${{ matrix.family_info.test-runs-on }}
    permissions:
      contents: read
      id-token: write
    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04_rocgdb:latest
      # BASE + GPU + ROCGDB (see comment near top of file). Inlined
      # because GHA's `env` context is not available in `container.options`.
      options: --ipc host --user 0:0 --ulimit memlock=-1:-1 --security-opt seccomp=unconfined --group-add video --device /dev/kfd --device /dev/dri --group-add 993 --group-add 992 --group-add 110 --env-file /etc/podinfo/gha-gpu-isolation-settings --cap-add=SYS_PTRACE
    env:
      THEROCK_REF: users/lumachad/rocgdb/multi-arch
      OUTPUT_ARTIFACTS_DIR: ${{ github.workspace }}/build
    steps:
      # TEMPORARY: see rocgdb_cpu / ROCm/TheRock#4960.
      - name: Checkout test_rocgdb.py (TEMP, see ROCm/TheRock#4960)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/ROCgdb
          ref: amd-staging
          path: rocgdb-src
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: true

      - name: Sparse-checkout TheRock for install_rocm_from_artifacts.py
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/TheRock
          ref: ${{ env.THEROCK_REF }}
          path: therock
          sparse-checkout: build_tools
          sparse-checkout-cone-mode: true

      - name: Install artifact-fetch dependencies
        run: python3 -m pip install boto3

      - name: Fetch debug-tools + tests artifacts
        working-directory: therock
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 build_tools/install_rocm_from_artifacts.py \
            --run-id=${{ github.run_id }} \
            --artifact-group=${{ matrix.family_info.amdgpu_family }} \
            --amdgpu-targets=${{ matrix.family_info.amdgpu_targets }} \
            --output-dir=${{ env.OUTPUT_ARTIFACTS_DIR }} \
            --debug-tools --tests

      - name: Run rocgdb GPU tests (gdb.rocm)
        run: |
          python3 rocgdb-src/.github/scripts/test_rocgdb.py --tests gdb.rocm

  multi_arch_ci_summary:
    name: Multi-Arch CI Summary
    if: always()
    needs:
      - setup
      - linux_build_and_test
      - rocgdb_cpu
      - rocgdb_gpu
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout TheRock repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "ROCm/TheRock"
          ref: users/lumachad/rocgdb/multi-arch
          sparse-checkout: build_tools/github_actions
          sparse-checkout-cone-mode: true

      - name: Evaluate workflow results
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python build_tools/github_actions/workflow_summary.py \
            --needs-json '${{ toJSON(needs) }}'
