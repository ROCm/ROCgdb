[tool.black]
include = "\\.py(\\.in)?$"

[tool.pyright]
typeCheckingMode = "strict"

[tool.isort]
profile = "black"

[tool.tclint]
exclude = [
# TODO:
"testsuite/boards",
"testsuite/config",
# IGNORE (document reason in trailing comment):
"testsuite/lib/ton.tcl", # Imported.
]

# A maximum line length of 80 is current policy, but it hasn't been too
# strictly enforced.  It's the most frequent and least harmful violation.
# Ignore this for now.
ignore = ["line-length"]

extensions = ["exp", "tcl"]

commands=["expect", "testsuite/tclint-plugin.py"]

[tool.tclint.style]
# Used by tclfmt.
indent = "mixed,4,8"

# Used by both tclint and tclfmt.  Current policy is 80.
line-length = 80

# Used by tclfmt.
max-blank-lines = 1

# Used by tclfmt.  False conflicts with emacs tcl mode.
indent-namespace-eval = true

# Used by tclfmt.
spaces-in-braces = false

[tool.codespell]

skip = [
# Skip ChangeLogs and generated files.
'*/ChangeLog*',
'*/configure',
'gdbsupport/Makefile.in',
'*.dat',
'*.eps',
'gdb/features/*.c',
'gdb/ada-casefold.h',
'gdb/copying.c',
'gdb/gdbarch-gen.h',
'gdb/gdbarch-gen.c',
'gdb/target-delegates-gen.c',
'gdb/aclocal.m4',
'gdbserver/aclocal.m4',
'gdbsupport/aclocal.m4',
# TODO:
'gdb/testsuite/Makefile.in',
'gdb/testsuite/TODO',
'gdb/testsuite/configure.ac',
'gdb/testsuite/boards/*',
'gdb/testsuite/config/*',
'gdb/testsuite/gdb.ada/*',
'gdb/testsuite/gdb.arch/*',
'gdb/testsuite/gdb.asm/*',
'gdb/testsuite/gdb.base/*',
'gdb/testsuite/gdb.btrace/*',
'gdb/testsuite/gdb.compile/*',
'gdb/testsuite/gdb.cp/*',
'gdb/testsuite/gdb.disasm/*',
'gdb/testsuite/gdb.dlang/*',
'gdb/testsuite/gdb.dwarf2/*',
'gdb/testsuite/gdb.fortran/*',
'gdb/testsuite/gdb.linespec/*',
'gdb/testsuite/gdb.python/*',
'gdb/testsuite/gdb.threads/*',
'gdb/testsuite/gdb.trace/*',
'gdb/testsuite/lib/*'
]

ignore-words = 'gdb/contrib/codespell-ignore-words.txt'
dictionary = 'gdb/contrib/codespell-dictionary.txt,-'

# Ignore all URLs.
uri-ignore-words-list = '*'

# How to ignore blocks of code.
ignore-multiline-regex = 'codespell:ignore-begin.*?codespell:ignore-end'
